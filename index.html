<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinónima</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<button class="menu-btn-mobile" id="btnMenuMobile" aria-label="Abrir menú">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="nav-overlay" id="navOverlay">
    <div class="nav-menu">
        <button class="close-menu" id="btnCloseMenu">&times;</button>
        <div class="nav-content">
            <div class="nav-section">
                <p class="nav-label">Preferencias</p>
                <button class="theme-toggle-mobile" id="themeToggleMobile">
                    <span id="themeTextMobile">MODO OSCURO</span>
                </button>
            </div>
            <div class="nav-section">
                <p class="nav-label">Donaciones</p>
                <p class="support-text-mobile">Ayúdame a conseguir un <strong>dominio propio</strong>.</p>
                <a href="https://ko-fi.com/sageaksnes" target="_blank" class="donate-btn-mobile">DONACIONES</a>
            </div>
        </div>
    </div>
</div>

<header>
    <div class="header-info">
        <h1>Sinónima</h1>
        <span>editor con sinónimos en tiempo real</span>
    </div>
    
    <div class="header-actions">
        <div class="support-message">Ayúdame a conseguir un <strong>dominio propio</strong>.</div>
        <a href="https://ko-fi.com/sageaksnes" target="_blank" class="donate-btn">DONACIONES</a>
        <button class="theme-toggle" id="themeToggle">TEMA</button>
    </div>
</header>

<div class="workspace">
    <div class="editor-pane">
        <div class="editor-toolbar">
            <div class="word-count" id="wordCount">0 palabras</div>
            <button class="copy-btn" id="copyBtn">Copiar texto</button>
        </div>
        <textarea id="editor" placeholder="Empieza a escribir…"></textarea>
    </div>
    <div class="syn-pane">
        <div class="syn-header">
            <p>Sinónimos de</p>
            <div class="current-word" id="currentWord">—</div>
        </div>
        <div class="syn-list" id="synList">
            <div class="syn-empty">Escribe algo...</div>
        </div>
    </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
